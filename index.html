<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0EA5A0" />
  <title>SpeakNow - 英语听说</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎤</text></svg>" />
</head>
<body>
  <header class="hdr">
    <h1>SpeakNow</h1>
    <button class="hdr-btn" onclick="openSettings()">⚙️</button>
  </header>

  <main>
    <div class="page active" id="p-today"></div>
    <div class="page" id="p-ted"></div>
    <div class="page" id="p-stats"></div>
  </main>

  <nav class="nav">
    <button class="nav-item active" data-page="today"><span class="ni">📋</span>今日</button>
    <button class="nav-item" data-page="ted"><span class="ni">🎬</span>TED</button>
    <button class="nav-item" data-page="stats"><span class="ni">📊</span>统计</button>
  </nav>

  <!-- Settings Modal -->
  <div class="modal" id="modal-settings">
    <div class="modal-bg" onclick="closeSettings()"></div>
    <div class="modal-sheet">
      <div class="ms-h">设置</div>
      <div class="field">
        <label>视频播放平台</label>
        <select id="video-source" onchange="setVideoSource(this.value)">
          <option value="bilibili">B站（国内推荐）</option>
          <option value="youtube">YouTube</option>
          <option value="ted">TED官网</option>
        </select>
      </div>
      <div class="tm" style="font-size:.8125rem">选择国内平台（B站）无需翻墙即可观看TED演讲</div>
      <button class="btn btn-g btn-block mt-16" onclick="closeSettings()">关闭</button>
    </div>
  </div>

  <!-- Video Modal -->
  <div class="modal" id="modal-video">
    <div class="modal-bg" onclick="closeVideo()"></div>
    <div class="modal-sheet" style="padding:12px">
      <div id="video-container"></div>
      <button class="btn btn-g btn-block mt-8" onclick="closeVideo()">关闭</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
